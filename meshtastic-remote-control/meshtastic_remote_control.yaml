mode: queued
max: 10

trigger:
  - platform: event
    event_type: meshtastic_api_text_message
    event_data:
      data:
        to:
          channel: !input channel_index

variables:
  gateway_node: !input gateway_node
  restrict_sender: !input restrict_sender
  reply_delay: !input reply_delay
  cmd1_trigger: !input cmd1_trigger
  cmd1_reply: !input cmd1_reply
  cmd2_trigger: !input cmd2_trigger
  cmd2_reply: !input cmd2_reply
  cmd3_trigger: !input cmd3_trigger
  cmd3_reply: !input cmd3_reply
  cmd4_trigger: !input cmd4_trigger
  cmd4_reply: !input cmd4_reply
  cmd5_trigger: !input cmd5_trigger
  cmd5_reply: !input cmd5_reply
  cmd6_trigger: !input cmd6_trigger
  cmd6_reply: !input cmd6_reply
  cmd7_trigger: !input cmd7_trigger
  cmd7_reply: !input cmd7_reply
  cmd8_trigger: !input cmd8_trigger
  cmd8_reply: !input cmd8_reply
  incoming_message: "{{ trigger.event.data.data.message | lower | trim }}"
  incoming_gateway: "{{ trigger.event.data.data.gateway }}"
  incoming_from: "{{ trigger.event.data.data.from }}"
  incoming_channel: "{{ trigger.event.data.data.to.channel }}"

condition:
  - condition: template
    value_template: "{{ incoming_gateway | int == gateway_node | int }}"
  - condition: template
    value_template: >
      {{ restrict_sender | int == 0
         or incoming_from | int == restrict_sender | int }}

action:
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ cmd1_trigger | length > 0
                 and cmd1_trigger | lower | trim == incoming_message }}
        sequence:
          - choose: []
            default: !input cmd1_actions
          - if:
              - condition: template
                value_template: "{{ cmd1_reply | length > 0 }}"
            then:
              - delay:
                  seconds: "{{ reply_delay }}"
              - action: meshtastic.send_text
                data:
                  ack: false
                  text: "{{ cmd1_reply }}"
                  from: "{{ incoming_gateway }}"
                  channel: "{{ incoming_channel }}"

      - conditions:
          - condition: template
            value_template: >
              {{ cmd2_trigger | length > 0
