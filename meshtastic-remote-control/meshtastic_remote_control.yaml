blueprint:
  name: Meshtastic Remote Control
  description: >
    Listen for text messages on a specific Meshtastic channel and run actions
    based on the message content. Up to 8 commands can be defined. Each command
    matches a trigger word (case-insensitive) and can run actions and send a
    reply back on the same channel.
  domain: automation
  input:
    gateway_section:
      name: Gateway & Channel
      icon: mdi:radio-tower
      input:
        gateway_node:
          name: Gateway Node ID
          description: >
            The decimal node ID of your Meshtastic gateway (the node connected
            to Home Assistant). Find it in Settings → Devices & Services →
            Meshtastic, or in the event data under "gateway".
          selector:
            number:
              min: 0
              max: 9999999999
              mode: box
        channel_index:
          name: Channel Index
          description: >
            Channel slot on the gateway (0-7). Slot 0 is the primary channel
            (usually LongFast). Your custom channels start at 1.
          default: 1
          selector:
            number:
              min: 0
              max: 7
              mode: box
        restrict_sender:
          name: Restrict to specific sender (optional)
          description: >
            If set, only messages from this node ID will trigger commands.
            Leave at 0 to accept from any sender on the channel.
          default: 0
          selector:
            number:
              min: 0
              max: 9999999999
              mode: box
        reply_delay:
          name: Reply delay (seconds)
          description: >
            Delay before sending replies, to let the radio finish receiving.
            2-5 seconds recommended.
          default: 3
          selector:
            number:
              min: 0
              max: 30
              unit_of_measurement: seconds
              mode: slider

    cmd1_section:
      name: Command 1
      icon: mdi:numeric-1-box
      input:
        cmd1_trigger:
          name: Trigger word
          description: Message text that activates this command (case-insensitive). Leave empty to disable.
          default: ""
          selector:
            text:
        cmd1_actions:
          name: Actions
          description: Actions to run when triggered.
          default: []
          selector:
            action:
        cmd1_reply:
          name: Reply text (optional)
          description: Message to send back on the channel. Leave empty for no reply.
          default: ""
          selector:
            text:

    cmd2_section:
      name: Command 2
      icon: mdi:numeric-2-box
      collapsed: true
      input:
        cmd2_trigger:
          name: Trigger word
          default: ""
          selector:
            text:
        cmd2_actions:
          name: Actions
          default: []
          selector:
            action:
        cmd2_reply:
          name: Reply text (optional)
          default: ""
          selector:
            text:

    cmd3_section:
      name: Command 3
      icon: mdi:numeric-3-box
      collapsed: true
      input:
        cmd3_trigger:
          name: Trigger word
          default: ""
          selector:
            text:
        cmd3_actions:
          name: Actions
          default: []
          selector:
            action:
        cmd3_reply:
          name: Reply text (optional)
          default: ""
          selector:
            text:

    cmd4_section:
      name: Command 4
      icon: mdi:numeric-4-box
      collapsed: true
      input:
        cmd4_trigger:
          name: Trigger word
          default: ""
          selector:
            text:
        cmd4_actions:
          name: Actions
          default: []
          selector:
            action:
        cmd4_reply:
          name: Reply text (optional)
          default: ""
          selector:
            text:

    cmd5_section:
      name: Command 5
      icon: mdi:numeric-5-box
      collapsed: true
      input:
        cmd5_trigger:
          name: Trigger word
          default: ""
          selector:
            text:
        cmd5_actions:
          name: Actions
          default: []
          selector:
            action:
        cmd5_reply:
          name: Reply text (optional)
          default: ""
          selector:
            text:

    cmd6_section:
      name: Command 6
      icon: mdi:numeric-6-box
      collapsed: true
      input:
        cmd6_trigger:
          name: Trigger word
          default: ""
          selector:
            text:
        cmd6_actions:
          name: Actions
          default: []
          selector:
            action:
        cmd6_reply:
          name: Reply text (optional)
          default: ""
          selector:
            text:

    cmd7_section:
      name: Command 7
      icon: mdi:numeric-7-box
      collapsed: true
      input:
        cmd7_trigger:
          name: Trigger word
          default: ""
          selector:
            text:
        cmd7_actions:
          name: Actions
          default: []
          selector:
            action:
        cmd7_reply:
          name: Reply text (optional)
          default: ""
          selector:
            text:

    cmd8_section:
      name: Command 8
      icon: mdi:numeric-8-box
      collapsed: true
      input:
        cmd8_trigger:
          name: Trigger word
          default: ""
          selector:
            text:
